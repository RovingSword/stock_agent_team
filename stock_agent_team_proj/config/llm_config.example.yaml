# LLM 配置
# ========== 说明 ==========
# 本配置文件用于配置 LLM 模型提供商和各 Agent 的参数
# 配置完成后，将文件重命名为 llm_config.yaml 即可使用
# API Key 请通过环境变量设置，参考 .env.example

llm:
  # 默认使用的 provider (deepseek/qwen/zhipu/moonshot/openai)
  default_provider: "deepseek"
  
  # 超时设置 (秒)
  timeout: 60
  
  # 最大重试次数
  max_retries: 3
  
  # ========== 模型提供商配置 ==========
  # 每个 provider 都需要设置对应的环境变量
  # api_key_env: 从哪个环境变量读取 API Key
  # base_url: API 端点地址
  # model: 使用的模型名称
  # temperature: 温度参数 (0.0-1.0, 越低越确定性，越高越创造性)
  # max_tokens: 最大生成 token 数
  providers:
    deepseek:
      # DeepSeek API Key (从环境变量 DEEPSEEK_API_KEY 读取)
      # 获取地址: https://platform.deepseek.com/
      api_key_env: "DEEPSEEK_API_KEY"
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      temperature: 0.7
      max_tokens: 2000
      # 可用模型: deepseek-chat, deepseek-coder, deepseek-prover
      
    qwen:
      # 通义千问 API Key (从环境变量 QWEN_API_KEY 读取)
      # 获取地址: https://dashscope.console.aliyun.com/
      api_key_env: "QWEN_API_KEY"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "qwen-plus"
      temperature: 0.7
      max_tokens: 2000
      # 可用模型: qwen-plus, qwen-turbo, qwen-max, qwen-long
      
    zhipu:
      # 智谱 AI API Key (从环境变量 ZHIPU_API_KEY 读取)
      # 获取地址: https://open.bigmodel.cn/
      api_key_env: "ZHIPU_API_KEY"
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-4"
      temperature: 0.7
      max_tokens: 2000
      # 可用模型: glm-4, glm-4-flash, glm-4-plus, glm-3-turbo
      
    moonshot:
      # Moonshot (月之暗面) API Key (从环境变量 MOONSHOT_API_KEY 读取)
      # 获取地址: https://platform.moonshot.cn/
      api_key_env: "MOONSHOT_API_KEY"
      base_url: "https://api.moonshot.cn/v1"
      model: "moonshot-v1-8k"
      temperature: 0.7
      max_tokens: 2000
      # 可用模型: moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k
      
    openai:
      # OpenAI API Key (从环境变量 OPENAI_API_KEY 读取)
      # 获取地址: https://platform.openai.com/
      api_key_env: "OPENAI_API_KEY"
      base_url: "https://api.openai.com/v1"
      model: "gpt-4"
      temperature: 0.7
      max_tokens: 2000
      # 可用模型: gpt-4, gpt-4-turbo, gpt-3.5-turbo

# ========== Agent 配置 ==========
# 为不同的 Agent 指定使用的模型提供商和参数
# provider: 使用的模型提供商
# temperature: Agent 特定的温度参数
agents:
  leader:
    # 决策者 Agent - 需要更稳定一致的输出
    provider: "deepseek"
    temperature: 0.5  # 较低温度使决策更稳定
    
  technical:
    # 技术分析 Agent
    provider: "deepseek"
    temperature: 0.7
    
  intelligence:
    # 情报收集 Agent
    provider: "deepseek"
    temperature: 0.7
    
  risk:
    # 风险管理 Agent - 需要更保守谨慎
    provider: "deepseek"
    temperature: 0.3  # 低温度确保风控建议保守
    
  fundamental:
    # 基本面分析 Agent
    provider: "deepseek"
    temperature: 0.7

# ========== 讨论配置 ==========
# 多 Agent 讨论相关设置
discussion:
  # 最大讨论轮数 (每轮每个 Agent 发言一次)
  max_rounds: 3
  
  # 是否启用辩论模式 (允许 Agent 提出不同意见)
  enable_debate: true
